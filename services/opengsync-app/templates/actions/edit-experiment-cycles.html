<div id="edit-experiment-cycles-form">
    <div class="row">
        {{ form.cycles_r1.render(class="col-3") }}
        {{ form.cycles_i1.render(class="col-3") }}
        {{ form.cycles_i2.render(class="col-3") }}
        {{ form.cycles_r2.render(class="col-3") }}
    </div>
    {{ form.csrf_token.render() }}
    <button type="button" class="btn btn-success"
        hx-target="#edit-experiment-cycles-form" hx-swap="outerHTML" hx-include="#edit-experiment-cycles-form"
        hx-post="{{ url_for('SetExperimentCyclesAction.Submit', experiment_id=form.experiment.id)}}">
        Save
    </button>
</div>
