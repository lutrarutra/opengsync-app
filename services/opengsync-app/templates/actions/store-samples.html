<div class="modal-content" id="store-samples-form-container">
    <div class="modal-header">
        <h1 class="modal-title fs-5" >Store Samples</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body tab-body" id="store-samples-form">
        {{ form.csrf_token.render() }}
        {{ form.render_general_errors() }}
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#store-samples-action-samples-tab"
                    type="button" role="tab" aria-controls="store-samples-action-samples-tab" aria-selected="true">
                    Samples
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button id="{{ form.selected_sample_ids.id }}-tab-btn" class="nav-link" data-bs-toggle="tab" data-bs-target="#store-samples-action-selected-samples-tab"
                    type="button" role="tab" aria-controls="store-samples-action-selected-samples-tab" aria-selected="false">
                    Selected Samples ({{ form.selected_sample_ids.data | length }})
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#store-samples-action-libraries-tab"
                    type="button" role="tab" aria-controls="store-samples-action-libraries-tab" aria-selected="false">
                    Libraries
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button id="{{ form.selected_library_ids.id }}-tab-btn" class="nav-link" data-bs-toggle="tab" data-bs-target="#store-samples-action-selected-libraries-tab"
                    type="button" role="tab" aria-controls="store-samples-action-selected-libraries-tab" aria-selected="false">
                    Selected Libraries ({{ form.selected_library_ids.data | length }})
                </button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="store-samples-action-samples-tab" role="tabpanel" tabindex="0">
                {{ form.selected_sample_ids.render() }}
            </div>
            <div class="tab-pane fade" id="store-samples-action-selected-samples-tab" role="tabpanel" tabindex="1">
                {{ form.selected_sample_ids.render_selected_table() }}
            </div>
            <div class="tab-pane fade" id="store-samples-action-libraries-tab" role="tabpanel" tabindex="2">
                {{ form.selected_library_ids.render() }}
            </div>
            <div class="tab-pane fade" id="store-samples-action-selected-libraries-tab" role="tabpanel" tabindex="3">
                {{ form.selected_library_ids.render_selected_table() }}
            </div>
        </div>
    </div>
    <div class="modal-footer" id="popup-footer">
        <div class="footer-id">
        </div>
        <div class="footer-info">
        </div>
        <div class="footer-controls">
            <button id="submit-store-samples-btn" class="btn btn-success"
            hx-include="#store-samples-form" hx-target="#store-samples-form-container" hx-swap="outerHTML"
            hx-post="{{ url_for('StoreSamplesAction.Submit') }}">Submit</button>
        </div>
    </div>
</div>
