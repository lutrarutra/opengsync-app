{% from "components/multi_select.jinja2" import multi_select_field %}
{% extends "base.html" %}
{% block content %}
<div class="page-content">
    <div class="pt-3">
        {{ multi_select_field(field=field) }}
    </div>
    <p>hello</p>
</div>
<script>
    $(document).ready(function() {
        const selects = [];
        $(".multiple-select").each(function() {
            selects.push(new MultipleSelect(this, {"selected": [1, 3]}));
        });
        let select = MultipleSelect.Get($(`#{{ field.name }}-multiselect-container`));
        console.log(select.getSelected());
    });
</script>
{% endblock content %}
