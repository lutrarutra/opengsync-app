<div class="example-table" id="example-spreadsheet">
</div>
<script>
    $(document).ready(function() {
        jspreadsheet(document.getElementById('example-spreadsheet'), {
            data: [
                ["multiome_human_A", "{{ C.GenomeRef.HUMAN.name }}", "{{ C.LibraryType.TENX_SC_GEX_3PRIME.name }}", "A1", "", ""],
                ["multiome_human_A", "{{ C.GenomeRef.HUMAN.name }}", "{{ C.LibraryType.TENX_SC_ATAC.name }}", "A2", "", ""],
                ["multiome_human_B", "{{ C.GenomeRef.HUMAN.name }}", "{{ C.LibraryType.TENX_SC_GEX_3PRIME.name }}", "A3", "", ""],
                ["multiome_human_B", "{{ C.GenomeRef.HUMAN.name }}", "{{ C.LibraryType.TENX_SC_ATAC.name }}", "A4", "", ""],
                ["multiome_mouse", "{{ C.GenomeRef.MOUSE.name }}", "{{ C.LibraryType.TENX_SC_GEX_3PRIME.name }}", "A5", "", ""],
                ["multiome_mouse", "{{ C.GenomeRef.MOUSE.name }}", "{{ C.LibraryType.TENX_SC_ATAC.name }}", "A6", "", ""],
            ],
            columns: [
                {% for col in form.spreadsheet.columns.values() %}
                {%- if col.type == "text" or col.type == "numeric" -%}
                { type: "{{col.type}}", title: "{{col.name}}", width: {{ col.width }} },
                {%- elif col["type"] == "dropdown" -%}
                { type: "{{col.type}}", title: "{{col.name}}", width: {{ col.width }}, source: {{ col.source | tojson }}, autocomplete: true, options: { newOptions: true } },
                {%- endif -%}
                {% endfor %}
            ],
        });
    });
</script>
