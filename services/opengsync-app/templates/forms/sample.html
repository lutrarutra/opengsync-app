<div class="modal-content" id="sample-form-container">
    <div class="modal-header">
        <h1 class="modal-title fs-5" >Edit Sample</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <div id="sample-form">
            {{ form.csrf_token.render() }}
            <div class="row">
                {{ form.name.render(class="col-6") }}
                {{ form.status.render(class="col-6") }}
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="footer-id">
        </div>
        <div class="footer-info">
        </div>
        <div class="footer-controls">
            <button class="btn btn-success" hx-include="#sample-form" hx-target="#sample-form-container"
                hx-swap="outerHTML" hx-post="{{ form.post_url }}">Save</button>
        </div>
    </div>
</div>
