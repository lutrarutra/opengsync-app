{% if groups is defined and groups %}
{% for group in groups %}
<li class="option" data-value="{{ group.id }}">
    <span class="search-select-name">{{ group.name }}</span>
    <span class="search-select-desc">{{ group.type.label }} {{ group.type.icon }}</span>
</li>
{% endfor %}
{% else %}
<li>
    <span class="disabled">No results...</span>
</li>
{% endif %}
