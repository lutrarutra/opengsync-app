{% if sequencers is defined and sequencers %}
{% for sequencer in sequencers %}
<li class="option" data-value="{{ sequencer.id }}">
    <span class="search-select-name">{{ sequencer.name }}</span>
    <span class="search-select-desc">{{ sequencer.model.manufacturer }} {{ sequencer.model.label }}</span>
</li>
{% endfor %}
{% else %}
<li>
    <span class="disabled">No results...</span>
</li>
{% endif %}
