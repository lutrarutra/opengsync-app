{% if results is defined and results %}
{% for res in results %}
<li class="option" data-value="{{ res.id }}">
    <span class="search-select-header">{{ res.identifier }}</span>
    <span class="search-select-name">{{ res.name }}</span>
    <span class="search-select-desc">{{ res.type.label }}</span>
</li>
{% endfor %}
{% else %}
<li>
    <span class="disabled">No results...</span>
</li>
{% endif %}
