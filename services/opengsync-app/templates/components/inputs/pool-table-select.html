{% from 'components/spinner.jinja2' import spinner %}
{% from 'components/tooltip.jinja2' import tooltip %}

<div class="pool-select-input {{ container_class }} {% if field.hidden %}d-none{% endif %}" id="{{ field.id }}-container">
    <input
        type="hidden"
        name="{{ field.name }}"
        id="{{ field.id }}"
        value="{{ field.data | tojson if field.data else '[]' }}"
    >
    <div class="invalid-feedback-container d-block pb-1" role="alert" style="min-height: 20px; width: 100%;">
        {% for error in field.errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
    <div hx-get="{{ field.table_url }}" hx-trigger="load" hx-swap="outerHTML">
        {{ spinner() }}
    </div>
</div>

{% if not field.read_only %}
<script>
    (function() {
        const containerId = "{{ field.id }}";
        const fieldId = "{{ field.id }}";
        const selectAll = {{ "true" if field.select_all else "false" }};

        // State
        let selectedPools = {{ field.data | tojson if field.data else "[]" }};
        let isMouseDown = false;
        let dragging = false;
        let hoveredPool = null;
        let selecting = true; // true = selecting, false = unselecting

        // DOM refs
        const $container = $("#" + containerId + "-container");
        const $hiddenInput = $("#" + fieldId);
        const $selectedCount = $("#" + fieldId + "-selected-count");
        const $selectedTableBody = $("#" + fieldId + "-selected-table-body");

        function syncHiddenInput() {
            $hiddenInput.val(JSON.stringify(selectedPools));
        }

        function updateCount() {
            $selectedCount.text(selectedPools.length);
            $("#" + fieldId + "-tab-btn").text("Selected Pools (" + selectedPools.length + ")");
        }

        function addPool(poolId, rowElement) {
            poolId = parseInt(poolId);
            if (selectedPools.includes(poolId)) return;
            selectedPools.push(poolId);
            $(rowElement).addClass("selected");

            // Clone row into selected table
            const $cloned = $(rowElement).clone();
            $cloned.attr("id", "selected-pool-row-" + poolId);
            $cloned.on("click", function() { removePool(poolId); });
            $selectedTableBody.append($cloned);

            syncHiddenInput();
            updateCount();
        }

        function removePool(poolId) {
            poolId = parseInt(poolId);
            selectedPools = selectedPools.filter(function(v) { return v !== poolId; });
            $("#pool-row-" + poolId).removeClass("selected");
            $("#selected-pool-row-" + poolId).remove();
            syncHiddenInput();
            updateCount();
        }

        function togglePool(poolId, rowElement) {
            poolId = parseInt(poolId);
            if (selectedPools.includes(poolId)) {
                removePool(poolId);
            } else {
                addPool(poolId, rowElement);
            }
        }

        // Delegate events on the browse table (which loads dynamically)
        $container.on("mousedown", ".pool-row", function(e) {
            e.preventDefault();
            isMouseDown = true;
            const firstId = parseInt($(this).data("id"));
            selecting = !selectedPools.includes(firstId);
            if (selecting) {
                addPool(firstId, this);
            } else {
                removePool(firstId);
            }
            hoveredPool = firstId;
        });

        $container.on("mousemove", ".pool-row", function(e) {
            if (isMouseDown) {
                dragging = true;
                const currentId = parseInt($(this).data("id"));
                if (hoveredPool !== currentId) {
                    hoveredPool = currentId;
                    if (selecting) {
                        addPool(currentId, this);
                    } else {
                        removePool(currentId);
                    }
                }
            }
        });

        $(document).on("mouseup", function(e) {
            isMouseDown = false;
            dragging = false;
        });

        // Cmd+A / Ctrl+A to select all visible rows
        $(document).on("keydown", function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === "a") {
                const $focused = $(document.activeElement);
                if ($focused.closest("#" + containerId + "-container").length) {
                    e.preventDefault();
                    $container.find(".pool-row").each(function() {
                        addPool($(this).data("id"), this);
                    });
                }
            }
        });

        // Select All button
        if (selectAll) {
            $(document).on("click", "#" + fieldId + "-select-all", function(e) {
                $container.find(".pool-row").each(function() {
                    addPool($(this).data("id"), this);
                });
            });
        }

        // Re-highlight selected rows after HTMX settles
        $(document).on("htmx:afterSettle", function(e) {
            if ($(e.target).closest("#" + containerId + "-container").length) {
                $container.find(".pool-row").each(function() {
                    const id = parseInt($(this).data("id"));
                    if (selectedPools.includes(id)) {
                        $(this).addClass("selected");
                    }
                });
            }
        });
    })();
</script>
{% endif %}
