{% from 'components/tooltip.jinja2' import tooltip %}
{% set selected_value = field.data if field.data is not none else field.default %}
<div class="form-group {{ container_class }} {% if field.hidden %}d-none{% endif %}">
    <a {% if field.description %}
    {{ tooltip(field.description, "top") }}
    {% endif %}>
        {{ field.label }}
    </a>
    <div class="select-container">
        {% if field.read_only %}
        <input type="hidden" name="{{ field.name }}" value="{{ field.data | default('', true) }}">
        {% endif %}
        <select class="form-control select-field {% if field.errors %}is-invalid{% endif %} {{ 'disabled' if field.read_only else '' }}" 
        {% if field.read_only %}disabled{% endif %}
        name="{{ field.name }}" id="{{ field.id }}">
            {% if field.default is none %}
            <option value="" disabled selected>Select {{ field.label }}</option>
            {% endif %}
            {% for option in field.options %}
            <option value="{{ option[0] }}"
            {% if selected_value is not none and option[0]|string == selected_value|string %}selected{% endif %}>
                {{ option[1] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="invalid-feedback-container d-block pb-1" role="alert" style="min-height: 20px; width: 100%;">
        {% for error in field.errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
</div>
