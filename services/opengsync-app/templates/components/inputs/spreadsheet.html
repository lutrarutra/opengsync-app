<div class="spreadsheet-container" {% if field.height %}style="height: {{ field.height }};"{% endif %}>
    <div class="invalid-feedback-container">
        {% if field._errors %}
        <p>Errors:</p>
        {% for error in field._errors %}
            <p>{{ error }}</p>
        {% endfor %}
        {% endif %}
    </div>
    <div id="{{ field.id }}" class="spreadsheet-grid"></div>
</div>
<script>
    load_jspreadsheet("{{ url_for('static', filename='js/jss-extended.js') }}").then(() => {
        window.spread_sheet = window.jspreadsheet(document.getElementById("{{ field.id }}"), {
            worksheets: [{
                data: {{ field.table_data | safe if field.table_data else "[[null]]" }},
                columns: [
                    {% for col in field.columns.values() %}
                    {%- if col.type == "text" or col.type == "numeric" -%}
                    { type: "{{col.type}}", title: "{{col.name}}", width: {{ col.width }} {% if col.read_only %},  readOnly: true{% endif %} },
                    {%- elif col["type"] == "dropdown" -%}
                    { type: "{{col.type}}", title: "{{col.name}}", width: {{ col.width }}, source: {{ col.source | tojson }}, autocomplete: true{% if col.read_only %},  readOnly: true {% endif %} },
                    {%- endif -%}
                    {% endfor %}
                ],
                minSpareRows: {{ field.min_spare_rows }},
                allowInsertColumn: {{ field.allow_new_cols }},
                allowDeleteColumn: {{ field.allow_new_cols }},
                allowManualInsertRow: {{ field.allow_new_rows }},
                allowInsertRow: {{ field.allow_new_rows }},
                allowDeleteRow: {{ field.allow_new_rows }},
                allowRenameColumn: {{ field.allow_col_rename }},
                tableOverflow: true,
                tableWidth: "100%",
                tableHeight: "100%",
                style: {{ field.style | tojson if field.style else "{}" }},
            }],
        })[0];

        {% if submit_btn_id %}
        $("#{{ submit_btn_id }}").on("click", function() {
            var data = spread_sheet.getData();

            htmx.ajax("POST", "{{ field.post_url | safe }}", {
                "target": "#{{ target_element_id }}",
                "swap": "outerHTML",
                "values": {
                    "spreadsheet": JSON.stringify(data),
                    "csrf_token": "{{ field.csrf_token }}",
                    "columns": JSON.stringify(spread_sheet.getHeaders()),
                },
            });

            disable_button($("#{{ submit_btn_id }}"));
        });
        {% endif %}
    });
</script>
