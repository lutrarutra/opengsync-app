{% from 'components/tooltip.jinja2' import tooltip %}
<div class="form-check {{ container_class }}">
  <input
    class="form-check-input"
    type="checkbox"
    id="{{ field.id }}"
    name="{{ field.name }}"
    value="true"
    {% if field.data %}checked{%endif%}
    {% if field.read_only %}readonly{%endif%}
  />
  <label class="form-check-label" for="{{ field.id }}"{% if field.description %}
    {{ tooltip(field.description, "top") }}
    {% endif %}>
    {{ field.label }}
  </label>
  {% for error in field.errors %}
  <div class="text-danger">{{ error }}</div>
  {% endfor %}
</div>
